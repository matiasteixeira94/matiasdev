<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gestão da Produção · Viana &amp; Moura Construções</title>
<link rel="stylesheet" href="css/styles.css" />
<style>
  html, body { height: 100%; }
  body { overflow-x: hidden; }

  .cover-hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; }
  .cover-photo {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 40%;
  }
  .cover-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(0deg, rgba(18, 8, 8, 0.94) 0%, rgba(35, 15, 15, 0.72) 32%, rgba(50, 18, 19, 0.28) 62%, rgba(60, 20, 20, 0.12) 100%);
  }
  .cover-content {
    position: relative; z-index: 1;
    padding: 56px clamp(20px, 6vw, 72px) 48px;
    display: flex; flex-direction: column; gap: 18px;
    max-width: 760px;
    color: #FBF1E3;
  }
  .cover-logo { width: 34px; height: 56px; }
  .cover-logo .logomark line { stroke: #E3B354; }
  .cover-logo .logomark polygon { fill: #E3B354; }
  .cover-eyebrow {
    font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700;
    color: #E3B354; margin-top: 6px;
  }
  .cover-title {
    font-family: var(--font-display); font-weight: 600; letter-spacing: 0.01em; text-wrap: balance;
    font-size: clamp(34px, 5.6vw, 58px); line-height: 1.02; margin: 2px 0 6px;
  }
  .cover-org {
    display: flex; flex-direction: column; gap: 6px;
    font-size: 15px; line-height: 1.5; color: rgba(251, 241, 227, 0.92);
    border-top: 1px solid rgba(251, 241, 227, 0.22);
    padding-top: 16px; margin-top: 4px;
  }
  .cover-org b { color: #FBF1E3; font-weight: 700; }
  .cover-actions { margin-top: 8px; }
  .cover-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px; font-size: 14px; font-weight: 700;
    background: #E3B354; color: #2B1414; border: none; border-radius: var(--radius-sm);
  }
  .cover-cta:hover { background: #EFC978; }
  .cover-cta svg { width: 16px; height: 16px; }

  @media (max-width: 560px) {
    .cover-content { padding: 40px 20px 36px; gap: 14px; }
    .cover-org { font-size: 13.5px; }
  }
</style>
</head>
<body>
  <div class="cover-hero">
    <img class="cover-photo" src="assets/images/capa-empreendimento.png" alt="Vista aérea de empreendimento residencial construído pela Viana &amp; Moura Construções" />
    <div class="cover-overlay"></div>
    <div class="cover-content">
      <div class="cover-logo" id="cover-logo"></div>
      <div>
        <div class="cover-eyebrow">Viana &amp; Moura Construções</div>
        <h1 class="cover-title">Gestão da Produção</h1>
      </div>
      <div class="cover-org">
        <div><b>Gerente de UGB:</b> Alisson Matias</div>
        <div><b>Supervisores Líderes:</b> José Pedro, Jucélio Lourenço, Patrícia Paes e Reginaldo Lima</div>
      </div>
      <div class="cover-actions">
        <a class="cover-cta" href="index.html">
          Entrar no painel
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
        </a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>document.getElementById("cover-logo").innerHTML = GP.LOGO_MARK_SVG;</script>
</body>
</html>
