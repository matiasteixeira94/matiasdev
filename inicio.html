<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gestão da Produção · Viana &amp; Moura Construções</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#A23A3E" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png" />
<link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gestão da Produção" />
<style>
  html, body { height: 100%; }
  body { overflow-x: hidden; }

  .cover-hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; }
  .cover-photo {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 40%;
  }
  .cover-photo-aerial {
    clip-path: polygon(0 0, 45% 0, 60% 100%, 0 100%);
  }
  /* A região da equipe é uma fatia diagonal estreita — a foto de grupo
     inteira não cabe num recorte só sem perder gente nas pontas. Por isso
     são 2 arquivos de imagem PRÉ-RECORTADOS (gerados a partir da foto
     original, não via CSS): um pega o lado esquerdo/centro do grupo, o
     outro o centro/direito, com sobreposição no meio — juntos, cobrem
     literalmente todo mundo que está na foto original. Cada <img> ocupa só
     a caixa retangular que envolve seu próprio pedaço do losango (não a
     hero inteira) — senão o object-fit:cover escala pela hero toda e a
     foto fica ampliada demais dentro da fatia visível.  */
  .cover-photo-team-top, .cover-photo-team-bottom {
    position: absolute; object-fit: cover;
  }
  .cover-photo-team-top {
    left: 45%; top: 0; width: 55%; height: 50%;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 13.6% 100%);
  }
  .cover-photo-team-bottom {
    left: 52.5%; top: 50%; width: 47.5%; height: 50%;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 15.8% 100%);
  }
  .cover-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(0deg, rgba(18, 8, 8, 0.94) 0%, rgba(35, 15, 15, 0.72) 32%, rgba(50, 18, 19, 0.28) 62%, rgba(60, 20, 20, 0.12) 100%);
  }
  .cover-content {
    position: relative; z-index: 1;
    padding: 56px clamp(20px, 6vw, 72px) 48px;
    display: flex; flex-direction: column; gap: 18px;
    max-width: 760px;
    color: #FBF1E3;
  }
  .cover-logo-full {
    height: clamp(64px, 9vw, 92px); width: auto; align-self: flex-start;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.45));
  }
  .cover-title {
    font-family: var(--font-display); font-weight: 600; letter-spacing: 0.01em; text-wrap: balance;
    font-size: clamp(30px, 5vw, 50px); line-height: 1.02; margin: 4px 0 6px;
  }
  .cover-org {
    display: flex; flex-direction: column; gap: 6px;
    font-size: 15px; line-height: 1.5; color: rgba(251, 241, 227, 0.92);
    border-top: 1px solid rgba(251, 241, 227, 0.22);
    padding-top: 16px; margin-top: 4px;
  }
  .cover-org b { color: #FBF1E3; font-weight: 700; }
  .cover-nav { display: flex; margin-top: 14px; }
  .cover-cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 28px; font-size: 15.5px; font-weight: 700; letter-spacing: 0.01em;
    border-radius: 999px; border: none;
    color: #2B1400; background: #E3B354;
    box-shadow: 0 10px 28px rgba(227, 179, 84, 0.28);
    transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
  }
  .cover-cta:hover { background: #EFC670; transform: translateY(-1px); box-shadow: 0 14px 34px rgba(227, 179, 84, 0.38); }
  .cover-cta svg { width: 18px; height: 18px; }

  @media (max-width: 900px) {
    /* Em telas estreitas a diagonal fica apertada demais — some a foto da
       equipe e volta a foto aérea a ocupar o quadro inteiro. */
    .cover-photo-aerial { clip-path: none; }
    .cover-photo-team-top, .cover-photo-team-bottom { display: none; }
  }
  @media (max-width: 560px) {
    .cover-content { padding: 40px 20px 36px; gap: 14px; }
    .cover-org { font-size: 13.5px; }
  }
</style>
</head>
<body>
  <div class="cover-hero">
    <img class="cover-photo cover-photo-aerial" src="assets/images/capa-empreendimento.png" alt="Vista aérea de empreendimento residencial construído pela Viana &amp; Moura Construções" />
    <img class="cover-photo cover-photo-team-top" src="assets/images/equipe-crop-top.jpg" alt="Equipe da UGB Caruaru em entrega de empreendimento" />
    <img class="cover-photo cover-photo-team-bottom" src="assets/images/equipe-crop-bottom.jpg" alt="" aria-hidden="true" />
    <div class="cover-overlay"></div>
    <div class="cover-content">
      <img class="cover-logo-full" src="assets/images/logo-viana-moura.png" alt="Viana &amp; Moura Construções" />
      <h1 class="cover-title">Gestão da Produção</h1>
      <div class="cover-org">
        <div><b>Gerente de UGB:</b> Alisson Matias</div>
        <div><b>Supervisores Líderes:</b> José Pedro, Jucélio Lourenço, Patrícia Paes e Reginaldo Lima</div>
      </div>
      <nav class="cover-nav">
        <a href="index.html" class="cover-cta">
          Acessar Gestão
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg>
        </a>
      </nav>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
    }
  </script>
</body>
</html>
