<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Entrar · Gestão da Produção</title>
<link rel="stylesheet" href="css/styles.css" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#A23A3E" />
<link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png" />
<link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Gestão da Produção" />
<style>
  html, body { height: 100%; }

  .login-hero {
    position: relative; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-bg {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    filter: blur(18px) brightness(1.06) saturate(0.9); transform: scale(1.08);
  }
  .login-bg-overlay { position: absolute; inset: 0; background: rgba(244, 231, 201, 0.55); }
  :root[data-theme="dark"] .login-bg-overlay { background: rgba(18, 14, 12, 0.62); }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .login-bg-overlay { background: rgba(18, 14, 12, 0.62); }
  }

  .login-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 380px;
    background: var(--surface-raised); border-radius: 18px;
    box-shadow: 0 24px 60px rgba(30, 14, 12, 0.28);
    padding: 36px 32px 30px;
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .login-logo { width: 148px; height: auto; }
  .login-form { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .login-field {
    width: 100%; padding: 13px 14px; border-radius: 10px;
    border: 1px solid var(--border-strong); background: var(--page);
    color: var(--ink); font-size: 14.5px; font-family: inherit; text-align: left;
  }
  .login-field:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .login-field-otp { text-align: center; letter-spacing: 0.4em; font-size: 20px; font-weight: 700; }
  .login-field-wrap { position: relative; width: 100%; }
  .login-field-wrap .login-field { padding-right: 42px; }
  .login-toggle-senha {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; color: var(--ink-muted); padding: 0;
  }
  .login-toggle-senha:hover { color: var(--ink); }
  .login-toggle-senha svg { width: 18px; height: 18px; }
  .login-error {
    font-size: 12.5px; color: var(--status-critical); text-align: center;
    min-height: 16px;
  }
  .login-submit {
    width: 100%; padding: 13px 14px; margin-top: 6px; border: none; border-radius: 10px;
    background: var(--accent); color: var(--accent-ink); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.12s ease;
  }
  .login-submit:hover { background: var(--accent-strong); }
  .login-submit:disabled { opacity: 0.6; cursor: default; }
  .login-forgot {
    font-size: 12.5px; color: var(--accent); text-align: center; background: none; border: none;
    cursor: pointer; font-family: inherit; padding: 2px;
  }
  .login-forgot:hover { text-decoration: underline; }
  .login-hint {
    font-size: 11.5px; color: var(--ink-muted); text-align: center; max-width: 300px;
    min-height: 14px;
  }
  .login-otp-intro { font-size: 12.5px; color: var(--ink-secondary); text-align: center; max-width: 300px; }
  .login-otp-links { display: flex; gap: 16px; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
  <div class="login-hero">
    <img class="login-bg" src="assets/images/capa-empreendimento.png" alt="" aria-hidden="true" />
    <div class="login-bg-overlay" aria-hidden="true"></div>
    <div class="login-card">
      <img class="login-logo" src="assets/images/logo-viana-moura.png" alt="Viana &amp; Moura Construções" />

      <form class="login-form" id="login-form" autocomplete="off">
        <input class="login-field" id="login-usuario" type="text" placeholder="Usuário" autocomplete="username" required />
        <div class="login-field-wrap">
          <input class="login-field" id="login-senha" type="password" placeholder="Senha" autocomplete="current-password" required />
          <button class="login-toggle-senha" id="toggle-senha" type="button" tabindex="-1" aria-label="Mostrar senha">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="login-error" id="login-error"></div>
        <button class="login-submit" id="login-submit" type="submit">Entrar</button>
      </form>

      <form class="login-form" id="otp-form" autocomplete="off" hidden>
        <p class="login-otp-intro">Digite o código de 6 dígitos enviado no WhatsApp do gerente de UGB.</p>
        <input class="login-field login-field-otp" id="otp-codigo" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••••" required />
        <div class="login-error" id="otp-error"></div>
        <button class="login-submit" id="otp-submit" type="submit">Confirmar</button>
        <div class="login-otp-links">
          <button class="login-forgot" id="otp-reenviar" type="button">Reenviar código</button>
          <button class="login-forgot" id="otp-voltar" type="button">Voltar</button>
        </div>
      </form>

      <button class="login-forgot" id="login-esqueci" type="button">Esqueci minha senha</button>
      <div class="login-hint" id="login-hint"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    "use strict";
    if (GP.getSession()) window.location.href = "index.html";

    const passoSenha = document.getElementById("login-form");
    const passoOtp = document.getElementById("otp-form");
    const erroSenha = document.getElementById("login-error");
    const erroOtp = document.getElementById("otp-error");
    const botaoSenha = document.getElementById("login-submit");
    const botaoOtp = document.getElementById("otp-submit");
    const campoCodigo = document.getElementById("otp-codigo");

    let credenciais = null; // { usuario, senha } — guardado em memória só pra "reenviar código"
    let token = null;

    const ICON_OLHO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>';
    const ICON_OLHO_FECHADO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><path d="M6.61 6.61A18.5 18.5 0 0 0 1 12s4 8 11 8a9.26 9.26 0 0 0 5.39-1.61"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    const campoSenha = document.getElementById("login-senha");
    const botaoToggleSenha = document.getElementById("toggle-senha");
    botaoToggleSenha.addEventListener("click", () => {
      const mostrar = campoSenha.type === "password";
      campoSenha.type = mostrar ? "text" : "password";
      botaoToggleSenha.innerHTML = mostrar ? ICON_OLHO_FECHADO : ICON_OLHO;
      botaoToggleSenha.setAttribute("aria-label", mostrar ? "Ocultar senha" : "Mostrar senha");
    });

    async function pedirCodigo(usuario, senha) {
      erroSenha.textContent = "";
      botaoSenha.disabled = true;
      try {
        const resposta = await fetch("/api/send-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ usuario, senha }),
        });
        const dados = await resposta.json().catch(() => ({}));
        if (!resposta.ok) { erroSenha.textContent = dados.erro || "Não foi possível enviar o código."; return false; }
        token = dados.token;
        return true;
      } catch {
        erroSenha.textContent = "Falha de conexão. Tente novamente.";
        return false;
      } finally {
        botaoSenha.disabled = false;
      }
    }

    passoSenha.addEventListener("submit", async (e) => {
      e.preventDefault();
      const usuario = document.getElementById("login-usuario").value;
      const senha = document.getElementById("login-senha").value;
      const ok = await pedirCodigo(usuario, senha);
      if (!ok) return;
      credenciais = { usuario, senha };
      passoSenha.hidden = true;
      passoOtp.hidden = false;
      erroOtp.textContent = "";
      campoCodigo.value = "";
      campoCodigo.focus();
    });

    passoOtp.addEventListener("submit", async (e) => {
      e.preventDefault();
      erroOtp.textContent = "";
      botaoOtp.disabled = true;
      try {
        const resposta = await fetch("/api/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, codigo: campoCodigo.value }),
        });
        const dados = await resposta.json().catch(() => ({}));
        if (!resposta.ok) { erroOtp.textContent = dados.erro || "Código inválido."; return; }
        GP.setSession({ usuario: dados.usuario, nome: dados.nome });
        window.location.href = "index.html";
      } catch {
        erroOtp.textContent = "Falha de conexão. Tente novamente.";
      } finally {
        botaoOtp.disabled = false;
      }
    });

    document.getElementById("otp-reenviar").addEventListener("click", async () => {
      if (!credenciais) return;
      erroOtp.textContent = "";
      const ok = await pedirCodigo(credenciais.usuario, credenciais.senha);
      erroOtp.textContent = ok ? "Novo código enviado." : (erroSenha.textContent || "Não foi possível reenviar.");
    });

    document.getElementById("otp-voltar").addEventListener("click", () => {
      passoOtp.hidden = true;
      passoSenha.hidden = false;
      token = null;
    });

    document.getElementById("login-esqueci").addEventListener("click", () => {
      document.getElementById("login-hint").textContent = "Fale com o gerente de UGB (Alisson Matias) para redefinir sua senha.";
    });
  </script>
</body>
</html>
